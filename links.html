<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLOWZ - Links</title>
  
  <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <link rel="shortcut icon" href="assets/favicon.png"/>
  
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --bg: #f2f0eb;
      --dark: #0d0d0d;
      --red: #e3150d;
      --muted: #888;
      --border: #d8d5cf;
      --surface: #ffffff;
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: var(--bg); 
      color: var(--dark); 
      font-family: 'Inter', sans-serif; 
      font-size: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 3rem 1.25rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ── PROFILE SECTION ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    
    .profile-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.25rem;
      border: 1px solid var(--border);
    }

    .profile-logo {
      display: block;
      height: 42px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      margin-bottom: 0.5rem;
      filter: brightness(0);
    }

    .subtitle {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--dark);
    }

    /* ── SECTION HEADINGS ── */
    .section-title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 1rem;
      color: var(--dark);
    }

    .block-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ── CARD STYLES ── */
    .card {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--dark);
      padding: 1rem 1.25rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--red);
      box-shadow: 0 4px 12px rgba(13, 13, 13, 0.05);
    }

    .card-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      margin-right: 1rem;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--dark);
      stroke-width: 1.75;
    }

    .card-cover {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      margin-right: 1rem;
      flex-shrink: 0;
    }

    .card-text {
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 1.5rem;
    }

    .card-title {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.4;
    }

    .card-dots {
      position: absolute;
      right: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .card-dots span {
      width: 3px;
      height: 3px;
      background: var(--border);
      border-radius: 50%;
    }
    .card:hover .card-dots span {
      background: var(--muted);
    }

    .booking-card .card-title {
      font-weight: 500;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      width: 100%;
    }
    footer p, footer a, footer button {
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
    }
    footer button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      vertical-align: baseline;
    }
    footer a:hover, footer button:hover {
      color: var(--red);
    }
  </style>
</head>
<body>
