<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FLOWZ – Booking</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 28px;
      background: rgba(25, 25, 25, 0.9);
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      box-sizing: border-box;
    }

    .logo {
      width: 180px;
      max-width: 100%;
      margin: 0 auto 14px;
      display: block;
    }

    .subtitle {
      display: block;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 18px;
      font-weight: 600;
    }

    p {
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 20px;
    }

    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      margin-top: 10px;
      border-radius: 12px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        color 0.22s ease,
        box-shadow 0.22s ease;
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .primary {
      background: #fff;
      color: #111;
      font-weight: 500;
      box-shadow: 0 6px 18px rgba(255, 255, 255, 0.06);
    }

    .primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(255, 255, 255, 0.1);
    }

    .secondary {
      background: #2a2a2a;
      color: #fff;
      font-weight: 600;
      padding: 14px 16px;
    }

    .secondary:hover {
      background: #333;
    }

    .secondary.copied {
      background: #fff;
      color: #111;
      transform: scale(1.03);
      box-shadow: 0 10px 24px rgba(255, 255, 255, 0.12);
    }

    .secondary.failed {
      background: #4a2222;
      color: #fff;
      transform: scale(1.03);
      box-shadow: 0 10px 24px rgba(120, 0, 0, 0.18);
    }

    .mail {
      margin-top: 14px;
      font-size: 14px;
      color: #aaa;
      display: none;
      word-break: break-all;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #777;
      min-height: 18px;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="logo.png" alt="FLOWZ" class="logo">
    <span class="subtitle">Booking Inquiries</span>

    <p>
      For booking inquiries, please include the details below.
    </p>

    <a
      class="btn primary"
      href="mailto:marvin@subvoidagency.com?subject=Booking%20Inquiry%20%E2%80%93%20FLOWZ&body=Booking%20Inquiry%20%E2%80%93%20FLOWZ%0A%0AEvent%20Name%3A%0ADate%3A%0ALocation%3A%0AVenue%20%2F%20Club%3A%0ACapacity%3A%0AFee%20%2F%20Budget%3A%0A%0AAdditional%20Details%3A"
    >
      Open Email
    </a>

    <button class="btn secondary" id="copyBtn" onclick="copyMail()">
      📋 Copy Email
    </button>

    <div class="mail" id="mail">
      marvin@subvoidagency.com
    </div>

    <div class="note" id="note">
      If nothing happens, copy the email manually.
    </div>
  </div>

  <script>
    function copyMail() {
      const mail = "marvin@subvoidagency.com";
      const note = document.getElementById("note");
      const mailEl = document.getElementById("mail");
      const btn = document.getElementById("copyBtn");

      navigator.clipboard.writeText(mail).then(() => {
        note.textContent = "Email copied.";
        btn.textContent = "✓ Copied";
        btn.classList.remove("failed");
        btn.classList.add("copied");

        setTimeout(() => {
          btn.textContent = "📋 Copy Email";
          btn.classList.remove("copied");
        }, 1300);
      }).catch(() => {
        note.textContent = "Copy failed. Showing address below.";
        mailEl.style.display = "block";
        btn.textContent = "✕ Failed";
        btn.classList.remove("copied");
        btn.classList.add("failed");

        setTimeout(() => {
          btn.textContent = "📋 Copy Email";
          btn.classList.remove("failed");
        }, 1500);
      });
    }
  </script>
</body>
</html>
