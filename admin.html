<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOWZ - Admin Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    /* ── LOKALE FONTS INJEKTION ── */

    /* Inter Light (300) */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url('fonts/inter-v18-latin-300.woff2') format('woff2');
    }

    /* Inter Regular (400) */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/inter-v18-latin-regular.woff2') format('woff2');
    }

    /* Inter Semi-Bold (600) */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('fonts/inter-v18-latin-600.woff2') format('woff2');
    }

    /* ── DASHBOARD STYLES ── */
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface-item: #1e1e1e;
      --border: #2a2a2a;
      --text: #ffffff;
      --text-muted: #888888;
      --red: #e3150d;
      --red-hover: #c01108;
      --green: #6ee7b7;
      --blue: #3b82f6;
      --orange: #f97316;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 2rem 1.5rem; line-height: 1.5; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 2px solid var(--red); padding-bottom: 0.5rem; }
    h3 { font-size: 1.2rem; margin: 1.5rem 0 1rem 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    hr { border: 0; height: 1px; background: var(--border); margin: 2rem 0; }

    .form-group { background: var(--surface); padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 1.5rem; }
    input[type="text"], input[type="password"], select { 
      width: 100%; padding: 0.75rem; margin-bottom: 1rem; 
      background: #000; border: 1px solid var(--border); color: #fff; 
      font-family: inherit; font-size: 0.9rem;
    }
    input:focus, select:focus { border-color: var(--blue); outline: none; }
    label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; cursor: pointer; font-size: 0.9rem; }

    button { padding: 0.75rem 1.2rem; font-family: inherit; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; border: none; cursor: pointer; transition: background 0.2s; }
    .btn-add { background: var(--blue); color: white; width: 100%; }
    .btn-delete { background: var(--red); color: white; }
    .btn-save { background: var(--green); color: #0d0d0d; font-size: 1rem; width: 100%; padding: 1rem; margin-top: 1.5rem; position: sticky; bottom: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .btn-action { background: #333; color: #fff; border: 1px solid #55px; }
    .btn-edit { background: var(--orange); color: #0d0d0d; }
    .btn-arrow { background: #2a2a2a; color: #fff; width: 35px; padding: 0.5rem 0; font-size: 1rem; }
    .btn-arrow:disabled { opacity: 0.2; cursor: not-allowed; }

    .show-item { background: var(--surface); border: 1px solid var(--border); padding: 1rem; margin-bottom: 0.75rem; }
    .show-row-view { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .show-item strong { font-size: 1.05rem; display: inline-block; margin-bottom: 0.2rem; }
    .show-info p { font-size: 0.85rem; color: var(--text-muted); }
    .status-badge { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; display: inline-block; margin-top: 0.25rem; }
    .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    
    .edit-form { display: none; background: #050505; padding: 1rem; margin-top: 0.5rem; border-left: 3px solid var(--orange); }

    #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #0d0d0d; z-index: 1000; display: flex; justify-content: center; align-items: center; }
    .login-box { background: var(--surface); padding: 2.5rem; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
    
    @media (max-width: 600px) {
      .show-row-view { flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div id="loginOverlay">
    <div class="login-box">
      <h2 style="margin-bottom: 1.5rem; letter-spacing: 0.1em;">ADMIN LOGIN</h2>
      <input type="text" id="loginUser" placeholder="Benutzername">
      <input type="password" id="loginPass" placeholder="Passwort">
      <button class="btn-add" onclick="handleLogin()">Einloggen</button>
      <div id="loginError" style="color: var(--red); margin-top: 1rem; font-size: 0.9rem; display: none;">Falsche Logindaten!</div>
    </div>
  </div>

  <div class="container">
    <h1>Show Manager</h1>
    <p style="font-size: 0.85rem; color: var(--green); margin-bottom: 1.5rem;">● Eingeloggt als Administrator</p>
    
    <h3>Neue Show hinzufügen</h3>
    <div class="form-group">
      <input type="text" id="newDate" placeholder="Datum (z.B. 01.01.2030)">
      <input type="text" id="newTitle" placeholder="Event Name">
      <input type="text" id="newSupport" placeholder="Support / Line-Up">
      <input type="text" id="newCity" placeholder="Stadt, Land">
      <input type="text" id="newBadge" placeholder="Location-Typ (z.B. Club, Festival, Event)">
      <label><input type="checkbox" id="newUpcoming" checked> Als "UPCOMING" markieren</label>
      <button class="btn-add" onclick="addShow()">Zur Liste hinzufügen</button>
    </div>

    <hr>
    <h3>Aktuelle Shows im Repository</h3>
    <div id="adminList">Lade Daten von GitHub...</div>
    
    <button class="btn-save" onclick="saveToGitHub()">Änderungen speichern</button>
  </div>

  <script>
    // ── CONFIGURATION ───────────────────────────────────────
    const repoOwner = "iamflowz-812"; 
    const repoName = "website";       
    const filePath = "shows.json";           
    const ALLOWED_USER = "admin";            
    
    // ACHTUNG: Hier fügst du deinen generierten Zeichensalat ein!
    const ENCRYPTED_TOKEN = "U2FsdGVkX19s84wwgE8UXe/gh1wnELEmc226yspUe+wdSwqbyimgD0trs6H1RDMH3P8psA4DTpb5+PZD05SASLbYnHCAi4LtQgcUeeGFIocY53t2qIcZalLzOp59Gj+Y1Eme+FuILwc2OpV7wQezsQ=="; 
    // ────────────────────────────────────────────────────────

    let decryptedToken = "";
    let localShows = [];
    let fileSha = "";

    // 1. LOGIN LOGIK
    function handleLogin() {
      const user = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;
      const errorEl = document.getElementById("loginError");

      if (user !== ALLOWED_USER || !ENCRYPTED_TOKEN) {
        errorEl.style.display = "block";
        return;
      }

      try {
        const bytes = CryptoJS.AES.decrypt(ENCRYPTED_TOKEN, pass);
        const decrypted = bytes.toString(CryptoJS.enc.Utf8);

        if (decrypted.startsWith("ghp_") || decrypted.startsWith("github_pat_")) {
          decryptedToken = decrypted;
          document.getElementById("loginOverlay").style.display = "none";
          loadDataFromGitHub();
        } else {
          errorEl.style.display = "block";
        }
      } catch (e) {
        errorEl.style.display = "block";
      }
    }

    // 2. DATEN VON GITHUB LADEN
    function loadDataFromGitHub() {
      if (!decryptedToken) return;

      const headers = { "Authorization": `token ${decryptedToken}` };

      fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`, { headers })
        .then(res => {
          if (!res.ok) throw new Error(`Status ${res.status}.`);
          return res.json();
        })
        .then(data => {
          fileSha = data.sha;
          const decodedContent = decodeURIComponent(escape(atob(data.content)));
          localShows = JSON.parse(decodedContent);
          renderAdminList();
        })
        .catch(err => {
          alert("Fehler beim Laden der GitHub-Daten: " + err.message);
        });
    }

    // 3. LISTE REPRÄSENTIEREN
    function renderAdminList() {
      const list = document.getElementById('adminList');
      list.innerHTML = '';
      
      if (localShows.length === 0) {
        list.innerHTML = "<p>Keine Shows gefunden.</p>";
        return;
      }

      localShows.forEach((show, index) => {
        const isFirst = index === 0;
        const isLast = index === localShows.length - 1;

        list.innerHTML += `
          <div class="show-item" id="item-${index}">
            <div class="show-row-view" id="view-${index}">
              <div class="show-info">
                <strong>${show.date} - ${show.title}</strong>
                <p>Ort: ${show.city} | Typ: ${show.badge} ${show.support ? '| Line-Up: ' + show.support : ''}</p>
                <span class="status-badge" style="color: ${show.upcoming ? 'var(--green)' : 'var(--red)'}">
                  ${show.upcoming ? '● Upcoming' : '○ Past / Archiv'}
                </span>
              </div>
              <div class="controls">
                <button class="btn-arrow" onclick="moveShow(${index}, -1)" ${isFirst ? 'disabled' : ''}>↑</button>
                <button class="btn-arrow" onclick="moveShow(${index}, 1)" ${isLast ? 'disabled' : ''}>↓</button>
                <button class="btn-action btn-edit" onclick="openEditForm(${index})">Bearbeiten</button>
                <button class="btn-action" onclick="toggleUpcoming(${index})">${show.upcoming ? 'Zu "Past"' : 'Zu "Upcoming"'}</button>
                <button class="btn-delete" onclick="deleteShow(${index})">Löschen</button>
              </div>
            </div>

            <div class="edit-form" id="editForm-${index}">
              <h4 style="color:var(--orange); margin-bottom:1rem;">Eintrag bearbeiten</h4>
              <input type="text" id="editDate-${index}" value="${show.date}" placeholder="Datum">
              <input type="text" id="editTitle-${index}" value="${show.title}" placeholder="Event Name">
              <input type="text" id="editSupport-${index}" value="${show.support || ''}" placeholder="Support">
              <input type="text" id="editCity-${index}" value="${show.city}" placeholder="Stadt">
              <input type="text" id="editBadge-${index}" value="${show.badge}" placeholder="Typ">
              <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                <button class="btn-action" style="background:var(--orange); color:#000;" onclick="saveLocalEdit(${index})">Übernehmen</button>
                <button class="btn-action" onclick="closeEditForm(${index})">Abbrechen</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    function openEditForm(index) {
      document.getElementById(`editForm-${index}`).style.display = "block";
      document.getElementById(`view-${index}`).style.display = "none";
    }

    function closeEditForm(index) {
      document.getElementById(`editForm-${index}`).style.display = "none";
      document.getElementById(`view-${index}`).style.display = "flex";
    }

    function saveLocalEdit(index) {
      localShows[index].date = document.getElementById(`editDate-${index}`).value;
      localShows[index].title = document.getElementById(`editTitle-${index}`).value;
      localShows[index].support = document.getElementById(`editSupport-${index}`).value;
      localShows[index].city = document.getElementById(`editCity-${index}`).value;
      localShows[index].badge = document.getElementById(`editBadge-${index}`).value;
      renderAdminList();
    }

    function moveShow(index, direction) {
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= localShows.length) return;
      const temp = localShows[index];
      localShows[index] = localShows[targetIndex];
      localShows[targetIndex] = temp;
      renderAdminList();
    }

    function toggleUpcoming(index) {
      localShows[index].upcoming = !localShows[index].upcoming;
      renderAdminList();
    }

    function deleteShow(index) {
      if(confirm(`"${localShows[index].title}" löschen?`)) {
        localShows.splice(index, 1);
        renderAdminList();
      }
    }

    function addShow() {
      const dateEl = document.getElementById('newDate');
      const titleEl = document.getElementById('newTitle');
      if (!dateEl.value || !titleEl.value) return alert("Datum und Name fehlen!");

      localShows.unshift({
        id: Date.now(),
        date: dateEl.value,
        title: titleEl.value,
        support: document.getElementById('newSupport').value,
        city: document.getElementById('newCity').value,
        badge: document.getElementById('newBadge').value || "Club",
        upcoming: document.getElementById('newUpcoming').checked
      });

      renderAdminList();
      titleEl.value = '';
    }

    // 4. LIVE AUF GITHUB SPEICHERN
    function saveToGitHub() {
      if (!decryptedToken) return;

      const jsonString = JSON.stringify(localShows, null, 2);
      const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

      fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`, {
        method: "PUT",
        headers: {
          "Authorization": `token ${decryptedToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: "Shows aktualisiert über Web-Admin-Dashboard",
          content: base64Content,
          sha: fileSha
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("Fehler beim Senden.");
        return res.json();
      })
      .then(result => {
        alert("Erfolgreich live gespeichert!");
        fileSha = result.content.sha;
        loadDataFromGitHub();
      })
      .catch(err => alert("Speicherfehler: " + err.message));
    }
  </script>
</body>
</html>
